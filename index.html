<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Armazém do Seu João</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 min-h-screen">
    <!-- Navbar -->
    <nav class="bg-white shadow-sm">
      <div
        class="max-w-5xl mx-auto px-4 py-4 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3"
      >
        <span class="text-xl font-bold text-gray-800"
          >🏪 Armazém do Seu João</span
        >
        <ul class="flex gap-6 text-sm font-medium text-gray-600">
          <li>
            <a
              href="index.html"
              class="text-blue-600 font-semibold hover:underline"
              >Início</a
            >
          </li>
          <li>
            <a href="products.html" class="hover:text-blue-600 hover:underline"
              >Produtos</a
            >
          </li>
          <li>
            <a href="customers.html" class="hover:text-blue-600 hover:underline"
              >Clientes</a
            >
          </li>
          <li>
            <a href="orders.html" class="hover:text-blue-600 hover:underline"
              >Pedidos</a
            >
          </li>
        </ul>
      </div>
    </nav>

    <!-- Main -->
    <main class="max-w-5xl mx-auto px-4 py-10">
      <h1 class="text-2xl font-bold text-gray-700 mb-8">Dashboard</h1>

      <div class="grid grid-cols-1 sm:grid-cols-3 gap-6">
        <!-- Card: Produtos -->
        <div
          class="bg-white rounded-2xl shadow-md p-6 flex flex-col items-center gap-2"
        >
          <span class="text-4xl">📦</span>
          <span
            id="count-products"
            class="text-5xl font-extrabold text-blue-600"
          >
            <span class="text-2xl text-gray-400">Carregando...</span>
          </span>
          <span
            class="text-gray-500 font-medium tracking-wide uppercase text-sm"
            >Total de Produtos</span
          >
        </div>

        <!-- Card: Clientes -->
        <div
          class="bg-white rounded-2xl shadow-md p-6 flex flex-col items-center gap-2"
        >
          <span class="text-4xl">👥</span>
          <span
            id="count-customers"
            class="text-5xl font-extrabold text-green-600"
          >
            <span class="text-2xl text-gray-400">Carregando...</span>
          </span>
          <span
            class="text-gray-500 font-medium tracking-wide uppercase text-sm"
            >Total de Clientes</span
          >
        </div>

        <!-- Card: Pedidos -->
        <div
          class="bg-white rounded-2xl shadow-md p-6 flex flex-col items-center gap-2"
        >
          <span class="text-4xl">🛒</span>
          <span
            id="count-orders"
            class="text-5xl font-extrabold text-purple-600"
          >
            <span class="text-2xl text-gray-400">Carregando...</span>
          </span>
          <span
            class="text-gray-500 font-medium tracking-wide uppercase text-sm"
            >Total de Pedidos</span
          >
        </div>
      </div>
    </main>

    <script src="js/config.js"></script>
    <script>
      async function loadCount(endpoint, elementId) {
        const el = document.getElementById(elementId);
        try {
          const data = await fetchAPI(endpoint);
          el.textContent = data.length;
        } catch (err) {
          el.innerHTML = `<span class="text-red-500 text-base font-semibold">Erro ao carregar</span>`;
        }
      }

      loadCount('/products', 'count-products');
      loadCount('/customers', 'count-customers');
      loadCount('/orders', 'count-orders');
    </script>
  </body>
</html>
